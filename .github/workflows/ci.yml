name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: services/worker/requirements.txt

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install worker dependencies
        run: python -m pip install -r services/worker/requirements.txt

      - name: Generate Prisma client
        run: pnpm --filter api run prisma:generate

      - name: Build shared types
        run: pnpm --filter @rag/shared-types run build

      - name: Lint API
        run: pnpm run lint

      - name: Typecheck API
        run: pnpm run typecheck

      - name: Run API unit tests
        run: pnpm run test:api

      - name: Run API e2e tests
        run: pnpm run test:api:e2e

      - name: Run worker tests
        run: pnpm run test:worker

      - name: Build API
        run: pnpm --filter api run build

      - name: Validate Compose config
        run: pnpm run compose:config

      - name: Validate Docker builds
        run: pnpm run docker:build

      - name: Write summary
        run: |
          {
            echo "## CI Summary"
            echo ""
            echo "- API lint"
            echo "- API typecheck"
            echo "- API unit tests"
            echo "- API e2e tests"
            echo "- Worker pytest suite"
            echo "- Compose config validation"
            echo "- API and worker Docker builds"
          } >> "$GITHUB_STEP_SUMMARY"

  migration-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag_user
          POSTGRES_PASSWORD: rag_password
          POSTGRES_DB: rag_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U rag_user -d rag_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
    env:
      DATABASE_URL: postgresql://rag_user:rag_password@localhost:5432/rag_db?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api run prisma:generate

      - name: Apply migrations
        run: pnpm --filter api run prisma:migrate:deploy

      - name: Seed demo data
        run: pnpm --filter api run seed:demo

      - name: Write summary
        run: |
          {
            echo "## Migration Smoke"
            echo ""
            echo "- Prisma migrations applied against pgvector Postgres"
            echo "- Demo seed completed successfully"
          } >> "$GITHUB_STEP_SUMMARY"
