name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: services/worker/requirements.txt

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install worker dependencies
        run: python -m pip install -r services/worker/requirements.txt

      - name: Generate Prisma client
        run: pnpm --filter api run prisma:generate

      - name: Build shared types
        run: pnpm --filter @rag/shared-types run build

      - name: Lint API
        run: pnpm run lint

      - name: Typecheck API
        run: pnpm run typecheck

      - name: Run API unit tests
        run: pnpm run test:api

      - name: Run API e2e tests
        run: pnpm run test:api:e2e

      - name: Run worker tests
        run: pnpm run test:worker

      - name: Build API
        run: pnpm --filter api run build

      - name: Prepare demo.env for compose steps
        run: cp infra/compose/demo.env.example infra/compose/demo.env

      - name: Validate Compose config
        run: pnpm run compose:config

      - name: Validate Docker builds
        run: pnpm run docker:build

      - name: Write summary
        run: |
          {
            echo "## CI Summary"
            echo ""
            echo "- API lint"
            echo "- API typecheck"
            echo "- API unit tests"
            echo "- API e2e tests"
            echo "- Worker pytest suite"
            echo "- Compose config validation"
            echo "- API and worker Docker builds"
          } >> "$GITHUB_STEP_SUMMARY"

  migration-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag_user
          POSTGRES_PASSWORD: rag_password
          POSTGRES_DB: rag_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U rag_user -d rag_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      minio:
        image: minio/minio
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        options: >-
          --health-cmd="curl -f http://localhost:9000/minio/health/live"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
        args:
          - server
          - /data
    env:
      DATABASE_URL: postgresql://rag_user:rag_password@localhost:5432/rag_db?schema=public
      JWT_SECRET: ci-test-jwt-secret-not-for-production
      JWT_ISSUER: rag-backend-api
      JWT_AUDIENCE: rag-backend-clients
      JWT_ACCESS_TTL: 60m
      BCRYPT_ROUNDS: 10
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      S3_ENDPOINT: http://localhost:9000
      S3_BUCKET: knowledge-base-bucket
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      INGEST_QUEUE_NAME: ingest_jobs
      OPENAI_API_KEY: ""
      OPENAI_GROUNDED_CHAT_ENABLED: "false"
      OPENAI_EMBEDDINGS_ENABLED: "false"
      OPENAI_CHAT_MODEL: gpt-4o-mini
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      DEMO_ADMIN_EMAIL: demo-admin@example.com
      DEMO_ADMIN_PASSWORD: DemoPass1234
      DEMO_EDITOR_EMAIL: demo-editor@example.com
      DEMO_EDITOR_PASSWORD: DemoPass1234
      DEMO_VIEWER_EMAIL: demo-viewer@example.com
      DEMO_VIEWER_PASSWORD: DemoPass1234
      DEMO_USER_EMAIL: demo-user@example.com
      DEMO_USER_PASSWORD: DemoPass1234
      DEMO_KB_NAME: Support Demo KB
      DEMO_KB_DESCRIPTION: CI test KB
      DEMO_KB_VISIBILITY: PRIVATE
      DEMO_EVAL_SET_NAME: Support Smoke Eval
      UPLOAD_MAX_BYTES: 10485760
      CORS_ORIGINS: http://localhost:5173
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api run prisma:generate

      - name: Apply migrations
        run: pnpm --filter api run prisma:migrate:deploy

      - name: Seed demo data
        run: pnpm --filter api run seed:demo

      - name: Write summary
        run: |
          {
            echo "## Migration Smoke"
            echo ""
            echo "- Prisma migrations applied against pgvector Postgres"
            echo "- Demo seed completed successfully"
          } >> "$GITHUB_STEP_SUMMARY"
